  <body>
    <div id="root"></div>
    
    <!-- Global Error Handler -->
    <script>
      window.addEventListener('error', function(e) {
        console.error('Global error caught:', e.error);
        if (document.getElementById('root').innerHTML === '') {
          document.getElementById('root').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#fff;font-family:sans-serif;text-align:center;flex-direction:column"><div><h1 style="font-size:2em;margin:0">⚠️ Oops!</h1><p style="margin:10px 0">Something went wrong. Refreshing...</p></div></div>';
          setTimeout(() => location.reload(), 2000);
        }
      });
      
      // Prevent unhandled promise rejections from crashing
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
        e.preventDefault();
      });
    </script>
